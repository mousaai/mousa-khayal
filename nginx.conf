# ══════════════════════════════════════════════════════════════════════
# Rate Limiting Zones — طبقات الحماية قبل تفعيل الدفع
# ══════════════════════════════════════════════════════════════════════

# منطقة عامة: 60 طلب/دقيقة لكل IP
limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;

# منطقة API: 30 طلب/دقيقة لكل IP
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

# منطقة الإنتاج الثقيل: 5 طلبات/دقيقة لكل IP (فيديو + صور)
limit_req_zone $binary_remote_addr zone=production:10m rate=5r/m;

# منطقة Webhook: 20 طلب/دقيقة (من Mousa.ai فقط)
limit_req_zone $binary_remote_addr zone=webhook:10m rate=20r/m;

server {
    listen 80;
    server_name khayal.mousa.ai;
    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name khayal.mousa.ai;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Webhook Receiver (Mousa.ai events) ─────────────────────────────
    location /api/internal/events {
        limit_req zone=webhook burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://localhost:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── tRPC الإنتاج الثقيل (فيديو + صور) ─────────────────────────────
    location ~* ^/api/trpc/(video\.(startProduction|quickProduce|autonomousProduce|surpriseProduce)|khayal\.generate) {
        limit_req zone=production burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://localhost:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 600s;
        proxy_connect_timeout 75s;
    }

    # ── tRPC عام ──────────────────────────────────────────────────────
    location /api/trpc {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://localhost:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # ── SSE (Server-Sent Events) — بدون rate limit ─────────────────────
    location /api/sse {
        proxy_pass http://localhost:3005;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # ── OAuth ─────────────────────────────────────────────────────────
    location /api/oauth {
        proxy_pass http://localhost:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── الصفحات والأصول الثابتة ─────────────────────────────────────
    location / {
        limit_req zone=general burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://localhost:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        proxy_pass http://localhost:3005;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Custom 429 error page
    error_page 429 /429.html;
    location = /429.html {
        return 429 '{"error":"طلبات كثيرة جداً — حاول مرة أخرى بعد دقيقة","code":429}';
        add_header Content-Type "application/json; charset=utf-8";
    }
}

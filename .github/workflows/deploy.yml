name: 🚀 Deploy KHAYAL to Production
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: 'سبب النشر اليدوي'
        required: false
        default: 'نشر يدوي'
jobs:
  deploy-khayal:
    name: 🏗️ نشر خيال (khayal.mousa.ai)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: 📤 Sync source code to server
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.env*' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ root@${{ secrets.SERVER_HOST }}:/var/www/mousa-khayal/

      - name: 🔧 Build & restart on server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            root@${{ secrets.SERVER_HOST }} \
            'cd /var/www/mousa-khayal && \
             export NODE_ENV=production && \
             export VITE_APP_ID="${{ secrets.VITE_APP_ID }}" && \
             export VITE_OAUTH_PORTAL_URL="${{ secrets.VITE_OAUTH_PORTAL_URL }}" && \
             export VITE_FRONTEND_FORGE_API_KEY="${{ secrets.VITE_FRONTEND_FORGE_API_KEY }}" && \
             export VITE_FRONTEND_FORGE_API_URL="${{ secrets.VITE_FRONTEND_FORGE_API_URL }}" && \
             pnpm install --no-frozen-lockfile && \
             pnpm build && \
             if pm2 describe khayal > /dev/null 2>&1; then \
               pm2 reload khayal --update-env; \
             else \
               pm2 start ecosystem.config.cjs; \
             fi && \
             pm2 save && \
             echo "✅ KHAYAL deployment complete!"'

      - name: ✅ Verify khayal.mousa.ai is up
        run: |
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://khayal.mousa.ai/ || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✅ khayal.mousa.ai → HTTP $STATUS — ONLINE"
          else
            echo "⚠️ khayal.mousa.ai → HTTP $STATUS — CHECK REQUIRED"
          fi

      - name: 📊 Notify on completion
        if: always()
        run: |
          curl -s -X POST "https://www.mousa.ai/api/platform/github-action-status" \
            -H "Content-Type: application/json" \
            -H "X-Platform-Key: USAA" \
            -d "{\"repo\":\"${{ github.repository }}\",\"action\":\"deploy\",\"status\":\"${{ job.status }}\",\"runId\":\"${{ github.run_id }}\",\"platform\":\"khayal\"}" || true

name: 🚀 Deploy KHAYAL to Production
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: 'سبب النشر اليدوي'
        required: false
        default: 'نشر يدوي'

jobs:
  deploy-khayal:
    name: 🏗️ نشر خيال (khayal.mousa.ai)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: 🔐 Build ecosystem.config.cjs from template
        run: |
          cp .github/ecosystem.config.template.cjs ecosystem.config.cjs
          sed -i "s|__WEBHOOK_SECRET__|${{ secrets.WEBHOOK_SECRET }}|g" ecosystem.config.cjs
          sed -i "s|__PLATFORM_API_KEY__|${{ secrets.PLATFORM_API_KEY }}|g" ecosystem.config.cjs
          sed -i "s|__JWT_SECRET__|${{ secrets.JWT_SECRET }}|g" ecosystem.config.cjs
          sed -i "s|__DATABASE_URL__|${{ secrets.DATABASE_URL }}|g" ecosystem.config.cjs
          sed -i "s|__MOUSA_API_KEY__|${{ secrets.MOUSA_API_KEY }}|g" ecosystem.config.cjs
          sed -i "s|__OPENAI_API_KEY__|${{ secrets.OPENAI_API_KEY }}|g" ecosystem.config.cjs
          sed -i "s|__GOOGLE_AI_KEY__|${{ secrets.GOOGLE_AI_KEY }}|g" ecosystem.config.cjs
          sed -i "s|__REPLICATE_API_TOKEN__|${{ secrets.REPLICATE_API_TOKEN }}|g" ecosystem.config.cjs
          sed -i "s|__ELEVENLABS_API_KEY__|${{ secrets.ELEVENLABS_API_KEY }}|g" ecosystem.config.cjs
          sed -i "s|__FISH_AUDIO_API_KEY__|${{ secrets.FISH_AUDIO_API_KEY }}|g" ecosystem.config.cjs
          sed -i "s|__CLOUDFLARE_R2_ACCOUNT_ID__|${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}|g" ecosystem.config.cjs
          sed -i "s|__CLOUDFLARE_R2_ACCESS_KEY_ID__|${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}|g" ecosystem.config.cjs
          sed -i "s|__CLOUDFLARE_R2_SECRET_ACCESS_KEY__|${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}|g" ecosystem.config.cjs
          sed -i "s|__CLOUDFLARE_R2_BUCKET_NAME__|${{ secrets.CLOUDFLARE_R2_BUCKET_NAME }}|g" ecosystem.config.cjs
          sed -i "s|__CLOUDFLARE_R2_PUBLIC_URL__|${{ secrets.CLOUDFLARE_R2_PUBLIC_URL }}|g" ecosystem.config.cjs
          sed -i "s|__VITE_APP_ID__|${{ secrets.VITE_APP_ID }}|g" ecosystem.config.cjs
          sed -i "s|__VITE_OAUTH_PORTAL_URL__|${{ secrets.VITE_OAUTH_PORTAL_URL }}|g" ecosystem.config.cjs
          sed -i "s|__VITE_FRONTEND_FORGE_API_KEY__|${{ secrets.VITE_FRONTEND_FORGE_API_KEY }}|g" ecosystem.config.cjs
          sed -i "s|__VITE_FRONTEND_FORGE_API_URL__|${{ secrets.VITE_FRONTEND_FORGE_API_URL }}|g" ecosystem.config.cjs
          echo "✅ ecosystem.config.cjs built from template"

      - name: 📤 Sync source code to server
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.env*' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ root@${{ secrets.SERVER_HOST }}:/var/www/mousa-khayal/
          echo "✅ Source code synced (ecosystem.config.cjs included)"

      - name: 🔧 Build & restart on server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            root@${{ secrets.SERVER_HOST }} \
            'cd /var/www/mousa-khayal \
             && export NODE_ENV=production \
             && export VITE_APP_ID="${{ secrets.VITE_APP_ID }}" \
             && export VITE_OAUTH_PORTAL_URL="${{ secrets.VITE_OAUTH_PORTAL_URL }}" \
             && export VITE_FRONTEND_FORGE_API_KEY="${{ secrets.VITE_FRONTEND_FORGE_API_KEY }}" \
             && export VITE_FRONTEND_FORGE_API_URL="${{ secrets.VITE_FRONTEND_FORGE_API_URL }}" \
             && pnpm install --no-frozen-lockfile \
             && pnpm build \
             && pm2 delete khayal 2>/dev/null || true \
             && pm2 start ecosystem.config.cjs --only khayal \
             && pm2 save \
             && echo "✅ KHAYAL deployment complete!"'

      - name: ✅ Verify khayal.mousa.ai is up
        run: |
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://khayal.mousa.ai/ || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✅ khayal.mousa.ai → HTTP $STATUS — ONLINE"
          else
            echo "⚠️ khayal.mousa.ai → HTTP $STATUS — CHECK REQUIRED"
            exit 1
          fi

      - name: 📊 Notify on completion
        if: always()
        run: |
          curl -s -X POST "https://www.mousa.ai/api/platform/github-action-status" \
            -H "Content-Type: application/json" \
            -H "X-Platform-Key: USAA" \
            -d "{\"repo\":\"${{ github.repository }}\",\"action\":\"deploy\",\"status\":\"${{ job.status }}\",\"runId\":\"${{ github.run_id }}\",\"platform\":\"khayal\"}" || true
